<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Axionix — Automatiza y escala tu negocio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #05070d;
    --bg-elev: #0b1020;
    --bg-card: #0d1426;
    --line: rgba(148, 184, 255, 0.08);
    --line-strong: rgba(148, 184, 255, 0.16);
    --text: #e6ecff;
    --text-dim: #8a96b3;
    --text-faint: #53607d;
    --accent: #22d3ee;
    --accent-2: #3b82f6;
    --accent-glow: rgba(34, 211, 238, 0.35);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(59, 130, 246, 0.18), transparent 60%),
      radial-gradient(ellipse 60% 40% at 85% 20%, rgba(34, 211, 238, 0.08), transparent 70%),
      linear-gradient(to bottom, #05070d, #05070d);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: "";
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(148, 184, 255, 0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(148, 184, 255, 0.035) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
    pointer-events: none;
    z-index: 0;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  #root { position: relative; z-index: 1; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 20px; border-radius: 10px; font-weight: 500; font-size: 14px; letter-spacing: -0.01em; cursor: pointer; transition: all 0.2s ease; text-decoration: none; border: 1px solid transparent; white-space: nowrap; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #02111f; font-weight: 600; box-shadow: 0 0 0 1px rgba(34,211,238,0.3), 0 8px 24px -8px var(--accent-glow); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 0 0 1px var(--accent), 0 12px 32px -8px var(--accent-glow); }
  .btn-outline { background: rgba(255,255,255,0.02); color: var(--text); border-color: var(--line-strong); }
  .btn-outline:hover { background: rgba(34,211,238,0.06); border-color: var(--accent); color: var(--accent); }
  .btn-ghost { background: transparent; color: var(--text-dim); }
  .btn-ghost:hover { color: var(--text); }
  .btn-glow { position: relative; background: rgba(10,18,36,0.6); color: var(--text); border: 1px solid var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 0 20px -4px var(--accent-glow); }
  .btn-glow:hover { background: rgba(34,211,238,0.12); }

  /* Section spacing */
  .container { max-width: 1240px; margin: 0 auto; padding: 0 32px; }
  @media (max-width: 640px) { .container { padding: 0 20px; } }

  /* Hero video glow */
  .hero-video-wrap {
    position: relative;
    border-radius: 20px;
    background: linear-gradient(135deg, rgba(34,211,238,0.4), rgba(59,130,246,0.4), rgba(34,211,238,0.1));
    padding: 1px;
    box-shadow: 0 0 80px -20px rgba(34, 211, 238, 0.35), 0 0 40px -10px rgba(59,130,246,0.3);
  }
  .hero-video-wrap::before {
    content: "";
    position: absolute; inset: -40px;
    background: radial-gradient(ellipse at center, rgba(34,211,238,0.15), transparent 70%);
    filter: blur(24px);
    z-index: -1;
    pointer-events: none;
  }
  .hero-video-inner {
    background: #020816;
    border-radius: 19px;
    overflow: hidden;
    position: relative;
  }
  .hero-video-inner video { display: block; width: 100%; height: auto; }

  /* Cards */
  .card {
    position: relative;
    background: linear-gradient(180deg, rgba(13,20,38,0.8), rgba(10,15,28,0.6));
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 32px;
    transition: all 0.25s ease;
    overflow: hidden;
  }
  .card:hover { border-color: var(--line-strong); transform: translateY(-2px); }
  .card::before {
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(circle at var(--mx, 50%) var(--my, 0%), rgba(34,211,238,0.08), transparent 40%);
    opacity: 0; transition: opacity 0.3s ease;
    pointer-events: none;
  }
  .card:hover::before { opacity: 1; }

  /* Nav blur */
  .nav {
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    background: rgba(5,7,13,0.7);
    border-bottom: 1px solid var(--line);
  }
  .nav-link { color: var(--text-dim); font-size: 14px; font-weight: 500; padding: 8px 14px; border-radius: 8px; text-decoration: none; transition: all 0.15s ease; position: relative; }
  .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .nav-link.active { color: var(--accent); }

  /* Logo mark */
  .logo-mark {
    width: 28px; height: 28px; border-radius: 7px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    position: relative;
    box-shadow: 0 0 16px -2px var(--accent-glow);
  }
  .logo-mark::after {
    content: ""; position: absolute; inset: 6px;
    background: var(--bg);
    border-radius: 3px;
    clip-path: polygon(0 100%, 50% 0, 100% 100%, 65% 100%, 50% 60%, 35% 100%);
  }

  /* Bento */
  .bento { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 20px; }
  @media (max-width: 900px) { .bento { grid-template-columns: 1fr; } }

  /* Pulse dot */
  @keyframes pulse-dot { 0%, 100% { box-shadow: 0 0 0 0 rgba(34,211,238,0.6); } 50% { box-shadow: 0 0 0 6px rgba(34,211,238,0); } }
  .pulse-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse-dot 2s infinite; }

  /* Marquee */
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .marquee-track { display: flex; gap: 56px; animation: marquee 40s linear infinite; width: max-content; }

  /* Shimmer for badges */
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

  /* Tilt grid in bento */
  .glyph-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(34,211,238,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34,211,238,0.05) 1px, transparent 1px);
    background-size: 24px 24px;
    mask-image: linear-gradient(135deg, black, transparent 70%);
    pointer-events: none;
  }

  /* Hide scrollbar for logos row */
  .no-scrollbar::-webkit-scrollbar { display: none; }

  /* Entry animation */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both; }

  /* Whatsapp button */
  .wa-btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 22px;
    background: linear-gradient(135deg, #25D366, #128C7E);
    color: white; font-weight: 600; font-size: 15px;
    border-radius: 12px; text-decoration: none;
    box-shadow: 0 10px 30px -10px rgba(37, 211, 102, 0.6);
    transition: all 0.2s ease;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .wa-btn:hover { transform: translateY(-1px); box-shadow: 0 16px 40px -10px rgba(37, 211, 102, 0.8); }

  .tag {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px; border-radius: 999px;
    border: 1px solid var(--line-strong);
    background: rgba(34, 211, 238, 0.04);
    font-size: 12px; color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.02em;
  }

  h1, h2, h3, h4 { font-family: 'Inter', sans-serif; letter-spacing: -0.02em; margin: 0; }
  h1 { font-size: clamp(40px, 6vw, 72px); font-weight: 700; line-height: 1.02; letter-spacing: -0.035em; }
  h2 { font-size: clamp(28px, 3.5vw, 44px); font-weight: 600; line-height: 1.1; letter-spacing: -0.03em; }
  h3 { font-size: 20px; font-weight: 600; letter-spacing: -0.015em; }
  p { margin: 0; line-height: 1.55; color: var(--text-dim); }

  .gradient-text {
    background: linear-gradient(135deg, var(--accent) 0%, #fff 50%, var(--accent-2) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Code-like tag */
  .code-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-faint);
  }
  .code-line .k { color: var(--accent); }
  .code-line .s { color: #c5d1eb; }

  /* Subtle corner markers */
  .corner-marks { position: relative; }
  .corner-marks::before, .corner-marks::after {
    content: ""; position: absolute; width: 10px; height: 10px;
    border: 1px solid var(--accent);
    opacity: 0.5;
  }
  .corner-marks::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .corner-marks::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

  /* Specific pieces */
  .orb {
    width: 100%; aspect-ratio: 1; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, var(--accent), var(--accent-2) 40%, #0a0e1a 75%);
    filter: blur(1px);
    box-shadow: 0 0 40px -5px var(--accent-glow);
  }

</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
